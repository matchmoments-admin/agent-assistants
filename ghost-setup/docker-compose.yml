version: '3.8'

services:
  ghost-askarthur:
    image: ghost:6-alpine
    container_name: ghost-askarthur
    restart: always
    environment:
      NODE_ENV: production
      url: https://blog.askarthur.au
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      database__useNullAsDefault: "true"
      mail__transport: SMTP
      mail__options__host: smtp.mailgun.org
      mail__options__port: "587"
      mail__options__auth__user: ${MAILGUN_ASKARTHUR_USER}
      mail__options__auth__pass: ${MAILGUN_ASKARTHUR_PASS}
      mail__from: hello@askarthur.au
    volumes:
      - ./sites/askarthur:/var/lib/ghost/content
    networks:
      - ghost-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - ghost-network
    depends_on:
      - ghost-askarthur

networks:
  ghost-network:
    driver: bridge
