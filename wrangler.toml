name = "agent-fleet"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[limits]
cpu_ms = 300000

[[kv_namespaces]]
binding = "AGENT_CONFIG"
id = "b795557a60614036bc21b9997b3598aa"

[[durable_objects.bindings]]
name = "AGENT_MEMORY"
class_name = "AgentMemory"

[[durable_objects.bindings]]
name = "BUDGET"
class_name = "BudgetDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentMemory"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["BudgetDO"]

[[vectorize]]
binding = "AGENT_VECTORS"
index_name = "agent-memory"

[[queues.producers]]
queue = "agent-tasks"
binding = "AGENT_TASKS"

[[queues.consumers]]
queue = "agent-tasks"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 2

[[workflows]]
name = "deploy"
binding = "DEPLOY_WORKFLOW"
class_name = "DeployWorkflow"

[[workflows]]
name = "rollback"
binding = "ROLLBACK_WORKFLOW"
class_name = "RollbackWorkflow"

[triggers]
crons = [
  "0 21 * * SUN",      # Blog draft: Sunday 7am AEST
  "0 0 * * MON",       # Weekly product digest: Monday 10am AEST
  "0 1 * * TUE",       # LinkedIn post: Tuesday 11am AEST
  "0 0 * * MON,WED,FRI", # Competitor scan + publish approved posts: Mon/Wed/Fri 10am AEST
  "0 22 1 * *"         # Monthly investor update: 1st of month 8am AEST
]

[vars]
PRODUCT_ID = "askarthur"
BUDGET_LIMIT_USD = "150"
WEB_SEARCH_CAP = "150"
GHOST_API_URL = "https://blog.askarthur.au"

# Secrets — set via: wrangler secret put <name>
