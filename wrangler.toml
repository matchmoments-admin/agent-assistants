# FOUNDER_EMAIL
# TELEGRAM_BOT_TOKEN
# TELEGRAM_ALLOWED_IDS
# TELEGRAM_WEBHOOK_SECRET
# GITHUB_PAT
# DEPLOY_HOOK_URL
# GH_REPO
